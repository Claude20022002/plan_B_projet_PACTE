# ────────────────────────────────────────────────────────────────────────────
#  HESTIM Planner — docker-compose.yml
#
#  Services :
#    mysql    — Base de données MySQL 8
#    backend  — API Express/Sequelize (port 5000)
#    frontend — React/Vite servi par Nginx (port 80)
#
#  Lancement :
#    docker compose up -d --build
#
#  Premier démarrage (seed) :
#    docker compose exec backend node seed.js
# ────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: hestim_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-hestim_root_2026}
      MYSQL_DATABASE:      ${DB_NAME:-hestim_planner}
      MYSQL_USER:          ${DB_USER:-hestim}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-hestim_pass_2026}
    volumes:
      - mysql_data:/var/lib/mysql
      # Script d'initialisation optionnel (ex: créer des index supplémentaires)
      # - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-3306}:3306"          # accessible depuis l'hôte pour debug
    healthcheck:
      # MySQL redémarre une fois lors du premier boot pour appliquer la config
      # → start_period étendu à 90s pour absorber ce cycle
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${DB_USER:-hestim}", "-p${DB_PASSWORD:-hestim_pass_2026}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - hestim_net

  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    image: claude20022002/hestim-backend:latest   # docker.io/claude20022002/hestim-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hestim_backend
    restart: unless-stopped
    env_file: .env.docker          # fichier dédié Docker (voir .env.docker.example)
    environment:
      NODE_ENV:   production
      DB_HOST:    mysql            # nom du service MySQL dans le réseau Docker
      DB_NAME:    ${DB_NAME:-hestim_planner}
      DB_USER:    ${DB_USER:-hestim}
      DB_PASSWORD: ${DB_PASSWORD:-hestim_pass_2026}
      PORT:       5000
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    networks:
      - hestim_net

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    image: claude20022002/hestim-frontend:latest  # docker.io/claude20022002/hestim-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # En production avec proxy Nginx, /api suffit.
        # Pour un domaine séparé : VITE_API_URL=https://api.mondomaine.com/api
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: hestim_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started   # frontend ne bloque pas sur backend healthy
    networks:
      - hestim_net

# ── Volumes persistants ────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Réseau interne isolé ───────────────────────────────────────────────────
networks:
  hestim_net:
    driver: bridge
